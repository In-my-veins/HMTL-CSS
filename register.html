<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
</head>
<body>
    
    <div>
        <form action="#" method="get">
            <div><label for="fname">Firstname</label>
            <input type="text" name="Firstname" id="fname">
            </div>
            <div><label for="lname">"lastname"</label>
            <input type="text"></div>


            <div><label for="email">Email</label>
            <input type="text" name="email" id="email"></div>
            <div><label for="Gender"></label>
            <input type="radio" name="gender" id="male" value="Male">
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="Female">
            <label for="female">"Female"</label>
            </div>
            <div><label for="Spoken languages"></label>
                <input type="checkbox" name="kinyarwanda" id="kinya" value="kinyarwanda">
                <label for="kinya">kinyarwanda</label>
                <input type="checkbox" name="English" id="kinya" value="English">
                <label for="en">English</label>
                <input type="checkbox" name="Kiswahili" id="sw" value="Kiswahili">
                <label for="sw">Kiswahili</label>
                <input type="checkbox" name="french" id="fr" value="French"> 
                <label for="fr">French</label>
                <input type="checkbox" name="Chinese" id="ch" value="Chinese">
                <label for="ch">Chinese</label> </div>
               <div>
                <select name="nationality" id="nationality">
                    <option value="nationality">SELECT</option>
                    <option value="Rwanda">Rwanda</option>
                    <option value="Uganda">Uganda</option>
                    <option value="Burundi">Burundi</option>
                    <option value="DRC">DRC</option>
                    <option value="Kenya">Kenya</option>
                    <option value="USA"></option>
                </select>
           </div>
           <div><label for="comment">Comment</label> <textarea name="comment" rows="5" cols="40"></textarea>
        </div>
        <input type="submit" value="Register now">   
        </form>
    </div>
</body>
</html>
