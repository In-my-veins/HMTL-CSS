<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .calculator {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 280px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }
    button {
      width: 45%;
      margin: 5px;
      padding: 10px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #4caf50;
      color: white;
      transition: 0.2s;
    }
    button:hover {
      background-color: #45a049;
    }
    #result {
      margin-top: 10px;
      font-size: 20px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h2>🧮 Simple Calculator</h2>
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="text" id="operator" placeholder="Enter operator (+, -, *, /)">
    <input type="number" id="num2" placeholder="Enter second number">
    <div>
      <button onclick="calculate()">Calculate</button>
      <button onclick="clearFields()">Clear</button>
    </div>
    <p id="result"></p>
  </div>

  <script>
    function calculate() {
      let num1 = parseFloat(document.getElementById("num1").value);
      let num2 = parseFloat(document.getElementById("num2").value);
      let operator = document.getElementById("operator").value.trim();
      let result;

      if (operator === "+") {
        result = num1 + num2;
      } else if (operator === "-") {
        result = num1 - num2;
      } else if (operator === "*") {
        result = num1 * num2;
      } else if (operator === "/") {
        if (num2 === 0) {
          document.getElementById("result").innerText = "Error: Division by zero!";
          return;
        }
        result = num1 / num2;
      } else {
        document.getElementById("result").innerText = "Invalid operator!";
        return;
      }

      document.getElementById("result").innerText = `Result: ${result}`;
    }

    function clearFields() {
      document.getElementById("num1").value = "";
      document.getElementById("num2").value = "";
      document.getElementById("operator").value = "";
      document.getElementById("result").innerText = "";
    }
  </script>
</body>
</html>
