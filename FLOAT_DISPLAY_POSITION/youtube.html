<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* HEADER */
#header{
    background:red;
    color:white;
    height:60px;
    line-height:60px;
    padding-left:20px;
}

/* SIDEBAR */
#sidebar{
    width:20%;
    height:100vh;
    background:#f1f1f1;
    float:left;
    padding:20px;
}

#sidebar ul{
    list-style:none;
}

#sidebar li{
    padding:15px 0;
    border-bottom:1px solid #ccc;
}

/* CONTENT AREA */
#content{
    width:80%;
    float:left;
    padding:20px;
}

/* VIDEO CARDS */
.video{
    width:30%;
    float:left;
    margin:1.5%;
}

.thumbnail{
    width:100%;
    height:150px;
    background:gray;
}

.video p{
    margin-top:10px;
    font-weight:bold;
}

/* CLEAR FLOAT */
.clear{
    clear:both;
}
</style>
<body>

    <!-- HEADER -->
    <div id="header">
        <h2>YouTube</h2>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <ul>
            <li>Home</li>
            <li>Trending</li>
            <li>Subscriptions</li>
            <li>Library</li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div id="content">

        <div class="video">
            <div class="thumbnail"></div>
            <p>Video Title 1</p>
        </div>

        <div class="video">
            <div class="thumbnail"></div>
            <p>Video Title 2</p>
        </div>

        <div class="video">
            <div class="thumbnail"></div>
            <p>Video Title 3</p>
        </div>

        <div class="video">
            <div class="thumbnail"></div>
            <p>Video Title 4</p>
        </div>

        <div class="video">
            <div class="thumbnail"></div>
            <p>Video Title 5</p>
        </div>

        <div class="video">
            <div class="thumbnail"></div>
            <p>Video Title 6</p>
        </div>

    </div>

    <div class="clear"></div>

</body>
</html>
